<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CleanSage{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            sage: { 500: '#4f8a6e', 600: '#3d7059', 700: '#2e5a46' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='cleansage.css') }}" />
  {% block head %}{% endblock %}
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="border-b border-gray-100 dark:border-gray-800">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-lg text-sage-600 dark:text-sage-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z"/>
        </svg>
        CleanSage
      </a>
      {% if session.get('authenticated') %}
      <a href="/dashboard" class="text-sm text-gray-600 dark:text-gray-400 hover:text-sage-600 dark:hover:text-sage-500 transition-colors">
        My Storage
      </a>
      {% endif %}
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 dark:border-gray-800 py-4">
    <div class="max-w-4xl mx-auto px-4 text-center text-xs text-gray-400 dark:text-gray-600">
      Your data never leaves Google's infrastructure
    </div>
  </footer>

</body>
</html>
