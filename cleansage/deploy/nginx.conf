# CleanSage nginx server block
# Place at: /etc/nginx/sites-available/cleansage
# Enable: ln -s /etc/nginx/sites-available/cleansage /etc/nginx/sites-enabled/cleansage
# SSL:    certbot --nginx -d cleansage.sageapps.in

server {
    listen 80;
    server_name cleansage.sageapps.in;

    # Certbot will insert SSL redirect here
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cleansage.sageapps.in;

    # SSL certs — filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/cleansage.sageapps.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cleansage.sageapps.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to gunicorn on port 5002
    location / {
        proxy_pass         http://127.0.0.1:5002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static files served directly by nginx (skip gunicorn)
    location /static/ {
        alias /home/cleansage/cleansage/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
